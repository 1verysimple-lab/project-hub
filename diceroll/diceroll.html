<script>
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const randInt = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const randChoice = arr => arr[Math.floor(Math.random()*arr.length)];

const FACE_ROT = {
  1:[0,0], 2:[90,0], 3:[0,-90],
  4:[0,90], 5:[-90,0], 6:[0,180]
};

const EASINGS = [
  'cubic-bezier(.2,.8,.2,1)',
  'cubic-bezier(.22,.9,.3,1)',
  'cubic-bezier(.18,.85,.25,1)',
  'cubic-bezier(.25,.7,.35,1)'
];

class Clack{
  constructor(){ this.enabled=true; this.ctx=null; }
  ensure(){
    if(!this.ctx){
      try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }
      catch(e){ this.ctx=null; }
    }
  }
  toggle(){ this.enabled=!this.enabled; return this.enabled; }
  play(){
    if(!this.enabled) return;
    this.ensure();
    if(!this.ctx) return;
    const ctx=this.ctx;
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.type='square';
    o.frequency.value=800+Math.random()*200;
    g.gain.value=0.0001;
    o.connect(g); g.connect(ctx.destination);
    const now=ctx.currentTime;
    g.gain.setValueAtTime(0.0001,now);
    g.gain.exponentialRampToValueAtTime(0.12,now+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.18);
    o.start(now); o.stop(now+0.2);
  }
}
const clack=new Clack();

class Die{
  constructor(i){
    this.index=i;
    this.rolling=false;
    this.result=null;
    this.element=this.build();
    this.cube=this.element.querySelector('.cube');
    this.initEvents();
  }

  build(){
    const scene=document.createElement('div');
    scene.className='scene';

    const cube=document.createElement('div');
    cube.className='cube';

    const faces=['front','back','right','left','top','bottom'];
    faces.forEach(cls=>{
      const f=document.createElement('div');
      f.className='face '+cls;
      cube.appendChild(f);
    });

    const floor=document.createElement('div');
    floor.className='floor';

    scene.appendChild(cube);
    scene.appendChild(floor);

    const order=[1,6,3,4,5,2];
    const faceEls=cube.querySelectorAll('.face');
    order.forEach((n,i)=>this.createPips(faceEls[i],n));

    document.getElementById('scenes').appendChild(scene);
    return scene;
  }

  createPips(face,n){
    face.innerHTML='';
    if(n===1){
      const h=document.createElement('div');
      h.className='heart';
      h.textContent='❤️';
      face.appendChild(h);
      return;
    }
    const pos={
      2:[[1,1],[3,3]],
      3:[[1,1],[2,2],[3,3]],
      4:[[1,1],[1,3],[3,1],[3,3]],
      5:[[1,1],[1,3],[2,2],[3,1],[3,3]],
      6:[[1,1],[1,2],[1,3],[3,1],[3,2],[3,3]]
    };
    pos[n].forEach(([r,c])=>{
      const p=document.createElement('div');
      p.className='pip';
      p.style.gridRow=r;
      p.style.gridColumn=c;
      face.appendChild(p);
    });
  }

  initEvents(){
    this.element.addEventListener('click',()=>{ if(!this.rolling) this.roll(); });
  }

  async roll(){
    if(this.rolling) return;
    this.rolling=true;

    const duration=Number(document.getElementById('duration').value)*1000;
    const intensity=Number(document.getElementById('intensity').value);

    const result=randInt(1,6);
    this.result=result;

    const base=FACE_ROT[result];
    const spinX=base[0]+360*intensity+randInt(0,360);
    const spinY=base[1]+360*intensity+randInt(0,360);

    const easing=randChoice(EASINGS);

    this.cube.style.transition=`transform ${duration}ms ${easing}`;
    requestAnimationFrame(()=>{
      this.cube.style.transform=`rotateX(${spinX}deg) rotateY(${spinY}deg)`;
    });

    await new Promise(res=>setTimeout(res,duration));

    this.cube.style.transition='none';
    this.cube.style.transform=`rotateX(${base[0]}deg) rotateY(${base[1]}deg)`;

    clack.play();
    this.updateBadge();

    setTimeout(()=>this.rolling=false,120);
    return result;
  }

  updateBadge(){
    const badge=document.getElementById('globalResult');
    badge.textContent=this.result;
    badge.animate(
      [{transform:'scale(1)'},{transform:'scale(1.1)'},{transform:'scale(1)'}],
      {duration:300,easing:'ease-out'}
    );
  }
}

class DiceApp{
  constructor(){
    this.dice=[];
    this.historyList=document.getElementById('historyList');
    this.init();
  }

  init(){
    this.rollAllBtn=document.getElementById('rollAllBtn');
    this.diceColor=document.getElementById('diceColor');
    this.pipColor=document.getElementById('pipColor');
    this.diceCount=document.getElementById('diceCount');
    this.applyCount=document.getElementById('applyCount');
    this.toggleSound=document.getElementById('toggleSound');
    this.resetBtn=document.getElementById('resetBtn');
    this.diceSize=document.getElementById('diceSize');
    this.clearHistoryBtn=document.getElementById('clearHistory');

    this.createDice(Number(this.diceCount.value));

    this.rollAllBtn.addEventListener('click',()=>this.rollAll());
    this.applyCount.addEventListener('click',()=>this.setDiceCount(Number(this.diceCount.value)));
    this.diceColor.addEventListener('input',e=>document.documentElement.style.setProperty('--dice',e.target.value));
    this.pipColor.addEventListener('input',e=>document.documentElement.style.setProperty('--pip',e.target.value));
    this.toggleSound.addEventListener('click',()=>{
      const on=clack.toggle();
      this.toggleSound.textContent=on?'Sound: On':'Sound: Off';
    });
    this.resetBtn.addEventListener('click',()=>this.reset());
    this.clearHistoryBtn.addEventListener('click',()=>this.clearHistory());

    this.diceSize.addEventListener('input',e=>{
      const px = Number(e.target.value);
      document.documentElement.style.setProperty('--size', px + 'px');
      document.documentElement.style.setProperty('--face-radius', Math.round(px * 0.12) + 'px');
    });

    const startPx = Number(this.diceSize.value);
    document.documentElement.style.setProperty('--size', startPx + 'px');
    document.documentElement.style.setProperty('--face-radius', Math.round(startPx * 0.12) + 'px');
  }

  createDice(n){
    const scenes=document.getElementById('scenes');
    scenes.innerHTML='';
    this.dice=[];
    for(let i=0;i<n;i++){
      this.dice.push(new Die(i));
    }
  }

  setDiceCount(n){
    n=clamp(n,1,6);
    this.diceCount.value=n;
    this.createDice(n);
  }

  async rollAll(){
    const results=[];
    for(const d of this.dice){
      const r=await d.roll();
      results.push(r);
    }
    this.updateGlobalResult(results);
    this.addHistoryEntry(results);
  }

  updateGlobalResult(results){
    const badge=document.getElementById('globalResult');
    if(results.length===0){ badge.textContent='—'; return; }
    if(results.length===1) badge.textContent=results[0];
    else badge.textContent=results.join(' + ');
  }

  reset(){
    document.getElementById('globalResult').textContent='—';
    this.createDice(Number(this.diceCount.value));
  }

  addHistoryEntry(results){
    if(!results || !results.length) return;
    const now=new Date();
    const hh=String(now.getHours()).padStart(2,'0');
    const mm=String(now.getMinutes()).padStart(2,'0');
    const time=`${hh}:${mm}`;
    const sum=results.reduce((a,b)=>a+b,0);

    const item=document.createElement('div');
    item.className='history-item';

    const timeSpan=document.createElement('span');
    timeSpan.className='history-time';
    timeSpan.textContent=time;

    const text=document.createElement('span');
    const diceLabel = results.length===1 ? 'die' : 'dice';
    text.innerHTML = `— ${results.length} ${diceLabel} → ${results.join(' + ')} = <span class="history-sum">${sum}</span>`;

    item.appendChild(timeSpan);
    item.appendChild(text);

    this.historyList.appendChild(item);
    this.historyList.scrollTop=this.historyList.scrollHeight;
  }

  clearHistory(){
    this.historyList.innerHTML='';
  }
}

document.addEventListener('DOMContentLoaded',()=>new DiceApp());
</script>

</body>
</html>
